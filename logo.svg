<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1b4b"/>
      <stop offset="100%" stop-color="#060d24"/>
    </linearGradient>
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="55%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="shine" cx="28%" cy="18%" r="65%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.10)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="11" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background + shine -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <rect width="512" height="512" rx="110" fill="url(#shine)"/>

  <!-- Subtle border ring -->
  <rect x="2" y="2" width="508" height="508" rx="109"
        fill="none" stroke="rgba(129,140,248,0.22)" stroke-width="3"/>

  <!-- Ambient glow behind letters -->
  <ellipse cx="256" cy="265" rx="195" ry="120"
           fill="#4338ca" opacity="0.18" filter="url(#glow)"/>

  <!-- Developer corner bracket — top-left -->
  <path d="M 46 90 L 46 46 L 90 46"
        fill="none" stroke="rgba(56,189,248,0.55)"
        stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Developer corner bracket — bottom-right -->
  <path d="M 466 422 L 466 466 L 422 466"
        fill="none" stroke="rgba(192,132,252,0.55)"
        stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- OK letters -->
  <text x="256" y="330"
        font-family="-apple-system,'SF Pro Display','Helvetica Neue',Arial,sans-serif"
        font-size="290" font-weight="900"
        fill="url(#tg)" text-anchor="middle" letter-spacing="-16"
        filter="url(#glow)">OK</text>

  <!-- Gradient underline accent -->
  <rect x="148" y="362" width="216" height="7" rx="3.5"
        fill="url(#tg)" opacity="0.65"/>
</svg>
